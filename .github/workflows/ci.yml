name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .

      - name: Compile
        run: python -m compileall src tests

      - name: Unit tests
        env:
          PYTHONPATH: src
        run: python -m unittest discover -s tests -v

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with macOS UI dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[macos]"

      - name: Compile
        run: python -m compileall src tests

      - name: macOS-safe unit tests
        env:
          PYTHONPATH: src
        run: >
          python -m unittest
          tests.test_browser_reader
          tests.test_history
          tests.test_log_utils
          tests.test_main
          tests.test_parser
          tests.test_popover_server
          tests.test_projection
          tests.test_reader_worker
          tests.test_scripts
          tests.test_single_instance
          tests.test_update_checker
          -v
